title: Homebrew Documentation
description: Documentation for the missing package manager for macOS (or Linux).
url: https://docs.brew.sh

exclude:
  - AGENTS.md
  - bin
  - CNAME
  - docs_rubocop_style.yml
  - Gemfile*
  - Rakefile
  - README.md
  - vale-styles
  - vendor
include:
  - _*.html
plugins:
  - jekyll-optional-front-matter
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-titles-from-headings
optional_front_matter:
  remove_originals: true

permalink: :title

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: https://brew.sh/assets/img/homebrew-256x256.png
      search_name: Documentation
      search_site: docs
  - scope:
      path: governance
    values:
      category: governance-archives

kramdown:
  toc_levels: 2..3

logo: https://brew.sh/assets/img/homebrew.svg

twitter:
  username: MacHomebrew

facebook:
  publisher: https://www.facebook.com/machomebrew/
