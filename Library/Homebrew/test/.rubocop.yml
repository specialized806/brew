inherit_from:
  - ../.rubocop.yml

RSpec:
  Include:
    - ./*

RSpec/ContextWording:
  Prefixes:
    - when
    - with
    - without
    - if
    - unless
    - for
    - which
    - to

RSpec/DescribedClass:
  SkipBlocks: true

# RSpec helper methods typecheck better as regular methods.
Sorbet/BlockMethodDefinition:
  Enabled: false
